name: Unpack screener

on:
  push:
    paths:
      - ".github/workflows/unpack.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository files
        uses: actions/checkout@v4

      - name: Unpack ZIP
        run: |
          unzip -o stock-screener-iphone-v1.zip
          cp -R stock-screener-iphone/. .
          rm -rf stock-screener-iphone

      - name: Save unpacked files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Unpack stock screener" || exit 0
          git push
